name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-guard:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml version is 0.0.0
        run: |
          VERSION=$(cargo pkgid | sed 's/.*[#@]//')
          if [ "$VERSION" != "0.0.0" ]; then
            echo "error: Cargo.toml version must be 0.0.0 on main (got $VERSION)"
            exit 1
          fi

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: just lint

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: just test
